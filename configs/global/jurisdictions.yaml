# Jurisdiction Risk Database
# Covers ~45 key global mining jurisdictions.
#
# Fields:
#   id                          - machine identifier (snake_case)
#   name                        - display name
#   country                     - sovereign country
#   region                      - global region
#   aliases                     - fuzzy-match synonyms (lowercase)
#   risk_tier                   - 1 (top-tier) to 4 (very high risk)
#   risk_level                  - low | moderate | high | very_high
#   political_stability         - very_high | high | moderate | low | very_low
#   fraser_rank_approx          - approximate Fraser Institute PPI rank (1 = best)
#   permitting_timeline_months  - typical exploration-to-production permit timeline
#   corporate_tax_rate_pct      - headline corporate / mining income tax rate (%)
#   royalty_type                - royalty structure description
#   royalty_rate                - royalty rate / range as a string
#   key_strengths               - list of favourable attributes
#   key_risks                   - list of risk factors
#   recent_policy_notes         - material recent regulatory or policy changes

jurisdictions:

  # ── TIER 1 — Top-tier (low risk, high attractiveness) ────────────────────

  - id: nevada_usa
    name: Nevada, USA
    country: United States
    region: North America
    aliases: ["nevada", "nevada usa", "nevada, united states", "nv", "us - nevada", "nv usa"]
    risk_tier: 1
    risk_level: low
    political_stability: very_high
    fraser_rank_approx: 3
    permitting_timeline_months: 24
    corporate_tax_rate_pct: 21.0
    royalty_type: "State net proceeds of mines tax (2–5%); no federal royalty on patented land"
    royalty_rate: "2–5% net proceeds"
    key_strengths:
      - World-class hard-rock mining infrastructure
      - Established, transparent mining law
      - Highly skilled local workforce
      - Tier 1 gold district (Carlin, Battle Mountain, Walker Lane)
      - Pro-mining regulatory culture
      - No federal royalty on patented mining claims
    key_risks:
      - Water scarcity in arid basins
      - Sage-grouse habitat restrictions on federal land
      - Longer federal permitting timelines on BLM land (2–7 years)
    recent_policy_notes: >
      Biden-era withdrawal orders affected some areas near national monuments.
      Nevada's state permitting remains efficient; federal NEPA review is the primary bottleneck.

