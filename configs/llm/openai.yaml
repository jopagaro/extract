# OpenAI provider configuration

default_model: gpt-5.4

models:
  # Primary — complex extraction, economics analysis, report writing
  primary:
    id: gpt-5.4
    context_window: 1000000
    max_output_tokens: 128000

  # Fast — quick summarization, simple classification, cheap tasks
  fast:
    id: gpt-5.4-mini
    context_window: 400000
    max_output_tokens: 128000

  # Reasoning — multi-step analysis (expensive, use sparingly)
  reasoning:
    id: gpt-5.4
    context_window: 1000000
    max_output_tokens: 128000

# Per-task model assignments (overrides default_model)
task_models:
  extraction: primary
  summarization: primary
  reporting: primary
  critique: primary
  scoring: fast

# API settings
temperature: 0.1
request_timeout_seconds: 120
max_retries: 3
retry_delay_seconds: 2
